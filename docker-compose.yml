version: "3.8"

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.15
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd

  minio:
    image: minio/minio:RELEASE.2024-05-10T01-41-38Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data
    ports:
      - "${MINIO_API_HOST_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-19001}:9001"
    volumes:
      - minio_data:/minio_data

  milvus:
    image: milvusdb/milvus:v2.4.6
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "${MILVUS_HOST_PORT:-19531}:19530"
      - "${MILVUS_METRICS_HOST_PORT:-19091}:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      - etcd
      - minio

  app:
    build: .
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-0}
      LLM_JSON_MODE: ${LLM_JSON_MODE:-auto}
      LLM_MAX_PROMPT_CHARS: ${LLM_MAX_PROMPT_CHARS:-5000}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1200}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-${LLM_API_KEY:-}}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-${LLM_BASE_URL:-https://api.openai.com/v1}}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-512}
      EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-20}
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    depends_on:
      - milvus

  api:
    build: .
    command: ["uvicorn", "app.api.server:app", "--host", "0.0.0.0", "--port", "8000"]
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.openai.com/v1}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-30}
      LLM_MAX_RETRIES: ${LLM_MAX_RETRIES:-0}
      LLM_JSON_MODE: ${LLM_JSON_MODE:-auto}
      LLM_MAX_PROMPT_CHARS: ${LLM_MAX_PROMPT_CHARS:-5000}
      LLM_MAX_TOKENS: ${LLM_MAX_TOKENS:-1200}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-local}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-${LLM_API_KEY:-}}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-${LLM_BASE_URL:-https://api.openai.com/v1}}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-small-zh-v1.5}
      EMBEDDING_DIM: ${EMBEDDING_DIM:-512}
      EMBEDDING_TIMEOUT_SECONDS: ${EMBEDDING_TIMEOUT_SECONDS:-20}
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
    ports:
      - "${API_HOST_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - milvus

volumes:
  etcd_data:
  minio_data:
  milvus_data:
